# fly.toml app configuration file generated for octodrop-platform-api on 2026-02-16T17:00:53+13:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'octodrop-platform-api'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile'
  [build.args]
    OCTO_RUNTIME_BASE = 'registry.fly.io/octodrop-platform-api:runtime-base-py311-playwright'

[processes]
  app = 'uvicorn app.main:app --host 0.0.0.0 --port 8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
